paths:
  raw_normal_dir: "data/raw/normal"
  raw_anomaly_dir: "data/raw/anomaly"
  
  index_csv: data/processed/metadata/index.csv
  windows_csv: data/processed/metadata/windows.csv

  specs_dir: data/processed/specs

  split_json: data/splits/split_by_day_v1.json

  runs_dir: runs

audio:
  sample_rate: 16000    
  normalization: rms
  target_rms: 0.1

windowing:
  #window_sec: 1.0
  window_sec: 2.0
  stride_sec: 1.0    # 50% overlap
  #stride_sec: 1.0       # no overlap

spectrogram:
  #n_mels: 64
  n_mels: 96
  #n_fft: 1024
  n_fft: 4096
  hop_length: 512
  power: 2.0
  fmin: 0
  fmax: 8000
  log_eps: 1e-6
  normalization: none

split:
  train_ratio: 0.70
  val_ratio: 0.10
  test_ratio: 0.10
  
training:
  seed: 42
  batch_size: 32
  epochs: 200
  learning_rate: 0.001
  val_ratio: 0.1
  patience: 25
  min_delta: 1e-3
  
threshold:
  percentiles: [95, 99]

model:
  latent_dim: 64

isoforest:
  n_estimators: 300 # numero de arboles
  max_samples: "auto" # cuantas muestras usa cada arbol para construirse
  contamination: "auto" # proporción esperada de anomalías en el dataset
  random_state: 42 # fija la semilla aleatoria.
  use_scaler: false # resta la media de esa feature y divide por su desviacion estandar
  use_pca: true
  pca_components: 150
